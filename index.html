<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VCC Dashboard</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    height: -webkit-fill-available;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100svh;
    height: -webkit-fill-available;
    overflow: hidden;
    box-sizing: border-box;
  }
  .app-shell {
    background: #FFD100;
    flex: 1;
    display: none;
    flex-direction: column;
    margin: 19px 6px;
    border-radius: 14px;
    overflow: hidden;
    min-height: 0;
  }
  .app-shell.unlocked {
    display: flex;
  }
  header {
    background: #000;
    color: #FFD100;
    text-align: center;
    padding: 0.25rem 1rem;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  main {
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    padding: 0.25rem 0.25rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.2rem;
    font-size: 8px;
    color: #333;
    flex-shrink: 0;
  }
  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #999;
    display: inline-block;
    margin-right: 3px;
  }
  .status-dot.ok { background: #1a9e57; }
  .status-dot.error { background: #d32f2f; }
  .status-dot.loading { background: #f5a623; }
  .setup-row {
    display: flex;
    gap: 4px;
    margin-bottom: 0.25rem;
    flex-shrink: 0;
  }
  input[type="text"] {
    flex: 1;
    padding: 3px 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 10px;
    min-width: 0;
  }
  button {
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #fff;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  button:active { transform: scale(0.98); }
  .tile-groups {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }
  .tile-waiting-row {
    flex: 0 0 24%;
    display: grid;
    min-height: 0;
  }
  .tile-waiting-row .tile {
    height: 100%;
  }
  .tile-waiting-row .value { font-size: 56px; }
  .tile-waiting-row .label { font-size: 18px; }
  .tiles-squares {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    min-height: 0;
  }
  .tile {
    border-radius: 14px;
    padding: 0.5rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .tile .label {
    font-size: 15px;
    margin: 0 0 5px;
    font-weight: 600;
    line-height: 1.15;
  }
  .tile .value {
    font-size: 34px;
    font-weight: 800;
    margin: 0;
    line-height: 1.1;
  }
  .tile-offered { background: #1c2b4a; color: #fff; }
  .tile-answered { background: #1e7d3c; color: #fff; }
  .tile-abandoned { background: #b91c1c; color: #fff; }
  .tile-waiting { background: #0f5c66; color: #fff; }
  .tile-busy { background: #185fa5; color: #fff; }
  .tile-ready { background: #2e9e5b; color: #fff; }
  .tile-break { background: #8a5cc7; color: #fff; }
  .tile-lunch { background: #b45309; color: #fff; }
  .tile-wrap { background: #555; color: #fff; }
  .tile-longwait { background: #6d28d9; color: #fff; }
  .tile-abandontime { background: #9d174d; color: #fff; }
  .tile-asa { background: #1d4ed8; color: #fff; }
  .controls-row {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 8px;
    color: #333;
    flex-wrap: wrap;
    flex-shrink: 0;
    margin-top: 4px;
  }
  select { padding: 2px 4px; border-radius: 5px; border: 1px solid #ccc; font-size: 8px; }
  .refresh-now { margin-left: auto; padding: 3px 7px; font-size: 8px; }
  .error-msg {
    font-size: 11px;
    color: #c62828;
    margin-top: 0.4rem;
    display: none;
  }
  .updated {
    font-size: 10px;
    color: #444;
  }
</style>
</head>
<body>

<div id="password-gate" style="position:fixed; inset:0; background:#1a1a1a; display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px;">
  <div style="background:#fff; border-radius:14px; padding:2rem 1.5rem; max-width:320px; width:100%; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.3);">
    <p style="font-weight:700; font-size:16px; margin:0 0 4px; color:#1a1a1a;">Champion Power Equipment</p>
    <p style="font-size:13px; color:#666; margin:0 0 16px;">Enter password to view queue overview</p>
    <input type="password" id="gate-password" placeholder="Password" style="width:100%; padding:10px 12px; border-radius:8px; border:1px solid #ccc; font-size:14px; box-sizing:border-box; margin-bottom:10px;" />
    <button id="gate-submit" style="width:100%; padding:10px; border-radius:8px; border:none; background:#1c2b4a; color:#fff; font-weight:600; font-size:14px; cursor:pointer;">Enter</button>
    <p id="gate-error" style="color:#c62828; font-size:12px; margin:10px 0 0; display:none;">Incorrect password, try again.</p>
  </div>
</div>
<div class="app-shell">

<header>Champion Power Equipment</header>

<main>
  <div class="status-row">
    <span><span class="status-dot" id="status-dot"></span><span id="status-text">Not connected</span></span>
    <span class="updated" id="last-updated"></span>
  </div>

  <div class="tile-groups">
  <div class="tile-waiting-row">
    <div class="tile tile-waiting">
      <p class="label">Calls waiting</p>
      <p class="value" id="val-waiting">–</p>
    </div>
  </div>

  <div class="tiles-squares">
    <div class="tile tile-offered">
      <p class="label">Offered</p>
      <p class="value" id="val-offered">–</p>
    </div>
    <div class="tile tile-answered">
      <p class="label">Answered</p>
      <p class="value" id="val-answered">–</p>
    </div>
    <div class="tile tile-abandoned">
      <p class="label">Abandoned</p>
      <p class="value" id="val-abandoned">–</p>
    </div>
    <div class="tile tile-abandontime">
      <p class="label">Avg abandon</p>
      <p class="value" id="val-abandontime">–</p>
    </div>
    <div class="tile tile-longwait">
      <p class="label">Longest wait</p>
      <p class="value" id="val-longwait">–</p>
    </div>
    <div class="tile tile-asa">
      <p class="label">Avg answer time</p>
      <p class="value" id="val-asa">–</p>
    </div>
  </div>
  </div>

  <div class="controls-row">
    <label><input type="checkbox" id="auto-refresh" checked style="width:auto;" /> Auto-refresh every</label>
    <select id="refresh-interval">
      <option value="15000">15s</option>
      <option value="30000" selected>30s</option>
      <option value="60000">60s</option>
    </select>
    <button class="refresh-now" id="refresh-now-btn">Refresh now</button>
  </div>

  <p class="error-msg" id="error-msg"></p>
</main>
</div>

<script>
(function() {
  var CORRECT_PASSWORD = "champion2026";
  var SESSION_KEY = "cpe_dashboard_unlocked";

  var gate = document.getElementById('password-gate');
  var input = document.getElementById('gate-password');
  var submitBtn = document.getElementById('gate-submit');
  var errorMsg = document.getElementById('gate-error');
  var appShell = document.querySelector('.app-shell');

  function unlock() {
    gate.style.display = 'none';
    appShell.classList.add('unlocked');
    try { sessionStorage.setItem(SESSION_KEY, 'true'); } catch (e) {}
    if (window.startDashboard) window.startDashboard();
  }

  function tryPassword() {
    if (input.value === CORRECT_PASSWORD) {
      unlock();
    } else {
      errorMsg.style.display = 'block';
      input.value = '';
      input.focus();
    }
  }

  submitBtn.addEventListener('click', tryPassword);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryPassword();
  });

  var alreadyUnlocked = false;
  try { alreadyUnlocked = sessionStorage.getItem(SESSION_KEY) === 'true'; } catch (e) {}
  if (alreadyUnlocked) {
    gate.style.display = 'none';
    appShell.classList.add('unlocked');
    window.addEventListener('load', function() {
      if (window.startDashboard) window.startDashboard();
    });
  } else {
    input.focus();
  }
})();
</script>
<script>
(function() {
  var FLOW_URL = "https://bface2484326e4f58da4dd3aadfba7.17.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/553d43deab444d689cdd502d7c27de05/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=RsWSHFO8d7l0ek0jDk6u1Z5VlAcCZnZsRfikC0NmuZM";
  var timer = null;

  var statusDot = document.getElementById('status-dot');
  var statusText = document.getElementById('status-text');
  var lastUpdated = document.getElementById('last-updated');
  var errorMsg = document.getElementById('error-msg');
  var autoRefresh = document.getElementById('auto-refresh');
  var refreshInterval = document.getElementById('refresh-interval');
  var refreshNowBtn = document.getElementById('refresh-now-btn');

  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = msg ? 'block' : 'none';
  }

  function round(n) {
    var num = Number(n);
    return isNaN(num) ? '–' : Math.round(num).toLocaleString();
  }

  function formatTime(n) {
    var num = Number(n);
    if (isNaN(num)) return '–';
    var m = Math.floor(num / 60);
    var s = Math.round(num % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function fetchData() {
    setStatus('loading', 'Refreshing…');
    showError('');

    fetch(FLOW_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    })
      .then(function(r) {
        if (!r.ok) throw new Error('Request failed with status ' + r.status);
        return r.json();
      })
      .then(function(data) {
        document.getElementById('val-offered').textContent = round(data.offered);
        document.getElementById('val-answered').textContent = round(data.answered);
        document.getElementById('val-abandoned').textContent = round(data.abandoned);
        document.getElementById('val-waiting').textContent = round(data.callsWaiting);
        document.getElementById('val-longwait').textContent = formatTime(data.longestWait);
        document.getElementById('val-abandontime').textContent = formatTime(data.avgAbandonTime);
        document.getElementById('val-asa').textContent = formatTime(data.asa);
        setStatus('ok', 'Connected');
        lastUpdated.textContent = 'Updated ' + new Date().toLocaleTimeString();
      })
      .catch(function(err) {
        setStatus('error', 'Connection failed');
        showError(err.message || 'Could not reach the data source.');
      });
  }

  function scheduleRefresh() {
    if (timer) clearInterval(timer);
    if (autoRefresh.checked) {
      timer = setInterval(fetchData, parseInt(refreshInterval.value, 10));
    }
  }

  refreshNowBtn.addEventListener('click', fetchData);
  autoRefresh.addEventListener('change', scheduleRefresh);
  refreshInterval.addEventListener('change', scheduleRefresh);

  window.startDashboard = function() {
    fetchData();
    scheduleRefresh();
  };
})();
</script>

</body>
</html>
